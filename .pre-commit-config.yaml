# Pre-commit hooks for mul-agent
# Install: pnpm install -g pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(docs/|dist/|vendor/|.*\.snap$)'
      - id: end-of-file-fixer
        exclude: '^(docs/|dist/|vendor/|.*\.snap$)'
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  # Python checks (for mul_agent backend)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: "^mul_agent/.*\\.py$"
      - id: ruff-format
        files: "^mul_agent/.*\\.py$"

  # Local hooks
  - repo: local
    hooks:
      # pnpm audit --prod --audit-level=high
      - id: pnpm-audit-prod
        name: pnpm-audit-prod
        entry: pnpm audit --prod --audit-level=high
        language: system
        pass_filenames: false
        always_run: true

      # oxlint
      - id: oxlint
        name: oxlint
        entry: pnpm exec oxlint ui/src ui/tests
        language: system
        pass_filenames: false
        types_or: [typescript, tsx]

      # oxfmt
      - id: oxfmt
        name: oxfmt
        entry: pnpm exec oxfmt check ui/src ui/tests
        language: system
        pass_filenames: false
        types_or: [typescript, tsx]

      # Python tests for mul_agent
      - id: python-tests
        name: python-tests
        entry: pytest -q tests/
        language: system
        pass_filenames: false
        types: [python]
